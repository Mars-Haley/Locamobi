  <div class="navbar w-full bg-color flex justify-between items-center mb-1 border-1 border-solid">
    <div id="menu" class="hidden lg:flex gap-4 flex-1">
      <a class="botoes-topo p-6 border-color text-lg">ALUGAR VEÍCULO</a>
      <a class="botoes-topo p-6 border-color text-lg">CADASTRAR VEÍCULO</a>
    </div>
    <div id="logo-menu " class="flex-1">
      <a class="logo" href="#">
        <img src="./assets/Logo.svg" alt="logo">
      </a>
    </div>
    <div id="menu-hamburguer" class="flex flex-col items-end relative lg:hidden flex-1">
      <i class="las la-bars text-4xl border-color"></i>
      <div id="menu-hamburguer-submenu" class="hidden flex-col bg-color absolute top-10">
        <a class="p-6 border-color text-lg">ALUGAR VEÍCULO</a>
      </div>
    </div>
    <div id="menu-login" class="flex gap-4 ml-auto">
      <a class="foto-perfil p-6">
        <img src="./assets/Login.svg" alt="foto-perfil">
      </a>
    </div>
  </div>

  <div class="input-wrapper">
    <div class="input-box">
      <label>Local de retirada</label>
      <input type="text" placeholder="Digite o endereço">
    </div>

    <div class="input-box">
      <label>Data e Hora de Retirada</label>
      <input type="datetime-local" placeholder="">
    </div>

  </div>

  <p class="carro-tipo"><b>Econômico</b></p>
  <div class="carros-grid" class="grid gap-4 grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6">
    <div class="carro-card">
      <img src="./assets/Econômico.png" alt="Carro Econômico">
    </div>

    <div class="carro-card">
      <img src="./assets/Intermediário.png" alt="Carro Intermediário">
    </div>

    <div class="carro-card">
      <img src="./assets/premium.png" alt="Carro Premium">
    </div>

    <div class="carro-card">
      <img src="./assets/utilitários.png" alt="Carros Utilitários">
    </div>
